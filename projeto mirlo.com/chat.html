<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suporte NexusLoot</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{ font-family:Inter,sans-serif; }

body{
  background:
    radial-gradient(circle at top left, rgba(168,85,247,.18), transparent 35%),
    radial-gradient(circle at bottom right, rgba(34,211,238,.12), transparent 35%),
    #030006;
  color:white;
  min-height:100vh;
  overflow-x:hidden;
}

.glow{ box-shadow:0 0 35px rgba(168,85,247,.45); }

.chat-scroll::-webkit-scrollbar{ width:6px; }
.chat-scroll::-webkit-scrollbar-thumb{ background:#7c3aed; border-radius:20px; }
.chat-scroll::-webkit-scrollbar-track{ background:transparent; }

.msg-in{ animation:slideIn .2s ease; }
@keyframes slideIn{
  from{ opacity:0; transform:translateY(8px); }
  to{ opacity:1; transform:translateY(0); }
}

.pulse-dot{
  width:10px; height:10px; border-radius:50%;
  background:#22c55e;
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%{ box-shadow:0 0 0 0 rgba(34,197,94,.5); }
  70%{ box-shadow:0 0 0 8px rgba(34,197,94,0); }
  100%{ box-shadow:0 0 0 0 rgba(34,197,94,0); }
}
</style>
</head>

<body class="flex flex-col min-h-screen">

<!-- NAV -->
<nav class="sticky top-0 z-50 bg-black/60 backdrop-blur-2xl border-b border-white/10">
  <div class="max-w-5xl mx-auto px-4 md:px-6 py-4 flex items-center justify-between gap-4">

    <div class="flex items-center gap-4">
      <a href="index.html" class="w-10 h-10 rounded-2xl bg-white/10 hover:bg-white/15 border border-white/10 flex items-center justify-center transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M15 19l-7-7 7-7"/>
        </svg>
      </a>
      <div>
        <h1 class="text-xl md:text-2xl font-black bg-gradient-to-r from-purple-400 via-fuchsia-500 to-cyan-400 bg-clip-text text-transparent">
          NexusLoot
        </h1>
        <p class="text-zinc-500 text-xs">Central de Suporte</p>
      </div>
    </div>

    <div class="flex items-center gap-2">
      <div class="pulse-dot"></div>
      <span class="text-green-400 font-bold text-sm">Online</span>
    </div>

  </div>
</nav>

<!-- MAIN -->
<main class="flex-1 max-w-5xl w-full mx-auto px-4 md:px-6 py-6 flex flex-col gap-4">

  <!-- HEADER -->
  <div class="bg-zinc-950/80 border border-purple-500/20 rounded-[28px] p-5 md:p-6 flex flex-col md:flex-row md:items-center justify-between gap-4 shadow-xl shadow-purple-950/20">

    <div class="flex items-center gap-4">
      <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-purple-600/30 to-fuchsia-600/20 border border-purple-500/20 flex items-center justify-center shrink-0">
        <svg class="w-7 h-7 text-purple-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/>
        </svg>
      </div>
      <div>
        <div class="inline-flex mb-1 px-3 py-1 rounded-full bg-purple-500/10 border border-purple-500/20 text-purple-300 text-xs font-black">
          Atendimento em tempo real
        </div>
        <h2 id="ticketProduct" class="text-xl md:text-2xl font-black">Carregando...</h2>
        <p id="ticketInfo" class="text-zinc-500 text-sm mt-0.5">Verificando suporte...</p>
      </div>
    </div>

    <div class="bg-black/40 border border-white/10 rounded-2xl px-5 py-3 text-center shrink-0">
      <p class="text-zinc-500 text-xs">Status</p>
      <h3 id="ticketStatusBadge" class="text-green-400 font-black text-lg mt-0.5">Aberto</h3>
    </div>

  </div>

  <!-- CHAT -->
  <div class="bg-zinc-950/80 border border-white/10 rounded-[28px] overflow-hidden shadow-xl shadow-purple-950/20 flex flex-col" style="min-height:500px;">

    <div id="messages" class="flex-1 chat-scroll overflow-y-auto p-5 md:p-7 space-y-4 bg-black/20" style="max-height:520px;"></div>

    <div class="border-t border-white/10 bg-black/30 p-4 md:p-6">
      <div class="flex gap-3 items-end">
        <textarea
          id="messageInput"
          placeholder="Digite sua mensagem..."
          rows="2"
          class="flex-1 bg-zinc-900/90 border border-white/10 focus:border-purple-500/60 rounded-2xl px-4 py-3 resize-none transition text-sm md:text-base outline-none"
          style="max-height:120px;"
        ></textarea>
        <button
          onclick="sendMessage()"
          class="shrink-0 w-12 h-12 md:w-14 md:h-14 rounded-2xl bg-gradient-to-br from-purple-600 to-fuchsia-600 glow flex items-center justify-center hover:scale-105 transition"
        >
          <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path d="M22 2L11 13"/>
            <path d="M22 2L15 22 11 13 2 9l20-7z"/>
          </svg>
        </button>
      </div>
      <p class="text-zinc-600 text-xs mt-3 text-center">
        Pressione Enter para enviar • Shift+Enter para nova linha
      </p>
    </div>

  </div>

</main>

<script type="module">

import { auth, db } from "./firebase.js"
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"
import {
  doc, getDoc, collection, addDoc,
  onSnapshot, query, orderBy, updateDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

const params = new URLSearchParams(window.location.search)
const ticketId = params.get("ticket")

const ticketProduct = document.getElementById("ticketProduct")
const ticketInfo = document.getElementById("ticketInfo")
const ticketStatusBadge = document.getElementById("ticketStatusBadge")
const messagesDiv = document.getElementById("messages")
const messageInput = document.getElementById("messageInput")

let currentUser = null
let ticketData = null
let unsubscribeMessages = null

if(!ticketId){
  alert("Ticket inválido.")
  window.location.href = "index.html"
}

onAuthStateChanged(auth, async user => {
  if(!user){
    alert("Faça login para acessar o suporte.")
    window.location.href = "index.html"
    return
  }
  currentUser = user
  await loadTicket()
})

async function loadTicket(){
  const ticketRef = doc(db,"tickets",ticketId)
  const ticketSnap = await getDoc(ticketRef)

  if(!ticketSnap.exists()){
    alert("Ticket não encontrado.")
    window.location.href = "index.html"
    return
  }

  ticketData = ticketSnap.data()

  if(ticketData.userEmail !== currentUser.email){
    alert("Você não tem permissão para acessar este ticket.")
    window.location.href = "index.html"
    return
  }

  ticketProduct.innerText = ticketData.product || "Suporte NexusLoot"

  const statusText = ticketData.status === "closed" ? "Fechado" : "Aberto"

  ticketInfo.innerText = ticketData.orderId
    ? `Pedido: ${ticketData.orderId} • Status: ${statusText}`
    : `Status: ${statusText}`

  ticketStatusBadge.innerText = statusText
  ticketStatusBadge.className = ticketData.status === "closed"
    ? "text-red-400 font-black text-lg mt-0.5"
    : "text-green-400 font-black text-lg mt-0.5"

  if(ticketData.status === "closed"){
    messageInput.disabled = true
    messageInput.placeholder = "Este ticket foi encerrado."
    messageInput.classList.add("opacity-40","cursor-not-allowed")
  }

  listenMessages()
}

function listenMessages(){
  if(unsubscribeMessages) unsubscribeMessages()

  const q = query(
    collection(db,"tickets",ticketId,"messages"),
    orderBy("createdAt","asc")
  )

  unsubscribeMessages = onSnapshot(q, snapshot => {
    messagesDiv.innerHTML = ""

    if(snapshot.empty){
      messagesDiv.innerHTML = `
        <div class="flex items-center justify-center py-20 text-center">
          <div class="bg-white/5 border border-white/10 rounded-[28px] p-10 max-w-sm">
            <div class="w-16 h-16 mx-auto rounded-2xl bg-purple-500/10 border border-purple-500/20 flex items-center justify-center text-3xl mb-5">💬</div>
            <h3 class="text-xl font-black">Suporte iniciado</h3>
            <p class="text-zinc-500 mt-2 text-sm">Envie uma mensagem para falar com o administrador.</p>
          </div>
        </div>
      `
      return
    }

    snapshot.forEach(docSnap => {
      const msg = docSnap.data()
      const isUser = msg.sender === "user"
      const isSystem = msg.sender === "system"

      messagesDiv.innerHTML += `
        <div class="msg-in flex ${isUser ? "justify-end" : isSystem ? "justify-center" : "justify-start"}">
          <div class="
            rounded-[20px] px-4 py-3 break-words
            ${isSystem
              ? "bg-yellow-500/10 border border-yellow-500/20 text-yellow-300 text-xs text-center max-w-[90%] py-2 px-6 rounded-full"
              : isUser
                ? "bg-gradient-to-br from-purple-600 to-fuchsia-700 text-white shadow-lg shadow-purple-950/40 max-w-[78%]"
                : "bg-zinc-900 border border-white/10 text-white max-w-[78%]"
            }
          ">
            ${!isSystem ? `<p class="text-[11px] opacity-60 mb-1 font-bold">${isUser ? "Você" : "ADM NexusLoot"}</p>` : ""}
            <p class="text-sm md:text-base leading-relaxed">${msg.text || ""}</p>
          </div>
        </div>
      `
    })

    messagesDiv.scrollTop = messagesDiv.scrollHeight
  })
}

window.sendMessage = async function(){
  const text = messageInput.value.trim()
  if(!text) return
  if(!ticketData){ alert("Ticket não carregado."); return }
  if(ticketData.status === "closed"){ alert("Este ticket já foi fechado."); return }

  await addDoc(collection(db,"tickets",ticketId,"messages"),{
    sender: "user",
    senderEmail: currentUser.email,
    text,
    createdAt: serverTimestamp()
  })

  await updateDoc(doc(db,"tickets",ticketId),{
    updatedAt: serverTimestamp()
  })

  messageInput.value = ""
  messageInput.style.height = "auto"
}

messageInput.addEventListener("keydown", e => {
  if(e.key === "Enter" && !e.shiftKey){
    e.preventDefault()
    window.sendMessage()
  }
})

messageInput.addEventListener("input", () => {
  messageInput.style.height = "auto"
  messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + "px"
})

</script>

</body>
</html>
